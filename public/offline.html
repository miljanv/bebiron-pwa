<!doctype html>
<html lang="sr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#FAF8F5" />
    <title>Bebiron — Offline</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        background: #faf8f5;
        color: #3a3a3a;
      }
      .card {
        max-width: 360px;
        width: 100%;
        text-align: center;
        background: #fff;
        border-radius: 24px;
        padding: 32px 24px;
        box-shadow: 0 2px 8px rgba(139, 155, 142, 0.08);
      }
      h1 {
        margin: 16px 0 8px;
        font-size: 1.25rem;
      }
      p {
        margin: 0;
        color: #9a8f82;
        line-height: 1.5;
      }
      button {
        margin-top: 24px;
        border: 0;
        border-radius: 16px;
        background: #8b9b8e;
        color: #fff;
        font-weight: 600;
        padding: 14px 20px;
        width: 100%;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/icons/icon-512.png" alt="Bebiron" width="72" height="72" />
      <h1>Niste povezani</h1>
      <p>Proverite internet konekciju i pokušajte ponovo.</p>
      <button type="button" onclick="window.location.reload()">Pokušaj ponovo</button>
    </div>
  </body>
</html>
